version: 2

updates:
  # npm dependencies (weekly, grouped by type to reduce PR noise)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      dev:
        dependency-type: "development"
      stripe:
        patterns:
          - "stripe"
          - "@stripe/*"
      upstash:
        patterns:
          - "@upstash/*"
      typescript:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"

  # GitHub Actions versions (weekly)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
