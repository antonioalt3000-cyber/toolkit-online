name: Playwright E2E (2x daily)

# Real browser-based synthetic tests against production (morning EU + evening EU/morning Americas).
# Catches regressions HTTP monitors miss: client-side crash, blank page 200, missing CTAs.

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 06:00 CET (morning EU)
    - cron: "0 17 * * *"  # 17:00 UTC = 18:00 CET (evening EU / morning Americas)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright smoke 5 SaaS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: pw
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload traces + videos on failure
        if: steps.pw.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Brevo alert on failure
        if: steps.pw.outcome != 'success'
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "$BREVO_API_KEY" ]; then exit 0; fi
          curl -s -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "accept: application/json" \
            -H "api-key: $BREVO_API_KEY" \
            -H "content-type: application/json" \
            -d "{\"sender\":{\"name\":\"DevToolsmith E2E\",\"email\":\"hello@captureapi.dev\"},\"to\":[{\"email\":\"antonio.alt3000@gmail.com\"}],\"subject\":\"🔴 Playwright E2E FAILED — $(date -u +%Y-%m-%dT%H:%MZ)\",\"htmlContent\":\"<p><strong>Playwright E2E test failed</strong> on one or more of the 5 SaaS.</p><p>Inspect traces + screenshots: <a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">GitHub Actions run</a></p><p>Artifacts: <code>playwright-report-${{ github.run_number }}</code> and <code>playwright-traces-${{ github.run_number }}</code>.</p>\"}" || true

      - name: Fail job if tests failed
        if: steps.pw.outcome != 'success'
        run: exit 1
