name: CI

# Quality gate on every pull request and on pushes to non-master branches.
# Mirrors the local pre-commit checks: lint -> typecheck -> test -> build.
# The scheduled weekly-quality.yml remains the master-branch safety net.

on:
  pull_request:
  push:
    branches-ignore:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Lint is informational for now: the repo has a known legacy baseline of
      # React 19 react-hooks errors. Typecheck/test/build are the hard gates.
      # Flip continue-on-error to false once the legacy lint debt is cleared.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
