name: Uptime Monitor

# Scheduled every 5 minutes, but GitHub Actions throttles scheduled workflows on
# busy repos: the REAL observed cadence is ~1-2h (measured 10 Jul 2026, gaps of
# 57-138 min between runs). Treat outage detection as "within ~1-2h", not 5 min.
# For sub-minute detection, move the ping to an external cron (e.g. UptimeRobot
# free tier) or Vercel Cron. Checks all 10 DevToolsmith sites and sends a Brevo
# alert email if any are down. State (prev status) is persisted in
# scripts/automation/.prev-status and only committed when it changes.

on:
  schedule:
    - cron: '*/5 * * * *' # requested every 5 min; effective cadence ~1-2h (GH throttling)
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Required to commit the .prev-status file on state change

concurrency:
  group: uptime-monitor
  cancel-in-progress: false

jobs:
  check:
    name: Check all sites
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Read previous status
        id: prev
        run: |
          STATUS=""
          if [ -f scripts/automation/.prev-status ]; then
            STATUS=$(tr -d '[:space:]' < scripts/automation/.prev-status)
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Previous status: '$STATUS'"

      - name: Run uptime check
        id: check
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          PREV_STATUS: ${{ steps.prev.outputs.status }}
        run: node scripts/automation/uptime-check.js

      - name: Persist new status (commit only on change)
        if: always()
        env:
          JOB_STEP_STATUS: ${{ steps.check.outcome }}
          PREV_STATUS: ${{ steps.prev.outputs.status }}
        run: |
          # NEW_STATUS:
          #   'up'   -> uptime-check exited 0 AND SITES_STILL_DOWN is not true
          #   'down' -> uptime-check exited 1 (new outage) OR SITES_STILL_DOWN=true
          if [ "$JOB_STEP_STATUS" = "success" ] && [ "$SITES_STILL_DOWN" != "true" ]; then
            NEW_STATUS="up"
          else
            NEW_STATUS="down"
          fi

          echo "Computed new status: $NEW_STATUS (was: '$PREV_STATUS')"

          if [ "$NEW_STATUS" = "$PREV_STATUS" ]; then
            echo "Status unchanged — nothing to commit."
            exit 0
          fi

          mkdir -p scripts/automation
          printf '%s\n' "$NEW_STATUS" > scripts/automation/.prev-status

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/automation/.prev-status
          git commit -m "chore(uptime): status -> $NEW_STATUS [skip ci]"

          # Retry push up to 3 times in case of concurrent run conflict.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed, pulling and retrying..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          echo "::warning::Failed to push .prev-status after 3 attempts"
