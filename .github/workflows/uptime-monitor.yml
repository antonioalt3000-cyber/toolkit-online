name: Uptime Monitor

# Runs every 5 minutes, 24/7, with PC off.
# Checks all 5 DevToolsmith sites and sends a Brevo alert email if any are down.
# Costs: ~8,640 runs/month × ~15s each ≈ 2,160 min/month (within 2,000 free tier on public repos;
#        use a private repo with GitHub Team/Pro for private repos).

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: read
  actions: write   # Required to update/create the PREV_STATUS repository variable

jobs:
  check:
    name: Check all sites
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run uptime check
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          # Set to 'down' to test recovery email flow
          PREV_STATUS: ${{ vars.PREV_STATUS || '' }}
        run: node scripts/automation/uptime-check.js

      # On success AND not "still down" state: update PREV_STATUS variable to 'up'
      - name: Update status variable (up)
        if: success() && env.SITES_STILL_DOWN != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.actions.updateRepoVariable({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'PREV_STATUS',
                value: 'up',
              });
            } catch (e) {
              // Variable may not exist yet — create it
              await github.rest.actions.createRepoVariable({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'PREV_STATUS',
                value: 'up',
              });
            }

      # On failure: update PREV_STATUS variable to 'down'
      - name: Update status variable (down)
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.actions.updateRepoVariable({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'PREV_STATUS',
                value: 'down',
              });
            } catch (e) {
              await github.rest.actions.createRepoVariable({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'PREV_STATUS',
                value: 'down',
              });
            }
