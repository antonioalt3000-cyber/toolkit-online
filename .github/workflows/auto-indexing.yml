name: Auto-Indexing (GSC + IndexNow)

# Submit sitemap to Google Search Console + ping IndexNow after every push to main
# Runs daily as safety catchup for any missed pushes

on:
  schedule:
    - cron: '0 7 * * *'   # Daily 07:00 UTC
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'app/**'
      - 'public/sitemap*.xml'
      - 'app/sitemap.ts'

jobs:
  indexing:
    name: Submit sitemaps + IndexNow ping
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: IndexNow ping for all sitemap URLs
        run: |
          # IndexNow is free + no auth required for Bing/Yandex
          # Generate random key (8+ chars) for the key file
          KEY="devtoolsmith-indexnow-$(date +%Y%m)"
          DOMAINS=(toolkitonline.vip complipilot.dev fixmyweb.dev paymentrescue.dev parseflow.dev captureapi.dev)

          for domain in "${DOMAINS[@]}"; do
            echo "=== $domain ==="
            # Fetch sitemap
            curl -s "https://${domain}/sitemap.xml" -o /tmp/sitemap.xml 2>/dev/null || continue

            # Extract URLs, limit to 100 per batch
            grep -oP '(?<=<loc>)[^<]+' /tmp/sitemap.xml | head -100 > /tmp/urls.txt

            URLCOUNT=$(wc -l < /tmp/urls.txt)
            echo "  URLs found: $URLCOUNT"

            if [ "$URLCOUNT" -gt 0 ]; then
              # Bing IndexNow (free, no auth)
              # Only uses the first URL as sample verification; real batch submit requires key file
              FIRST_URL=$(head -1 /tmp/urls.txt)
              curl -s -o /dev/null -w "  Bing IndexNow ping for $FIRST_URL: %{http_code}\n" \
                "https://www.bing.com/indexnow?url=${FIRST_URL}&key=${KEY}" || true
            fi
          done

      - name: Google Search Console sitemap status check
        env:
          # GSC submit requires OAuth; we use public "ping" endpoint instead which still works
          DOMAINS: "toolkitonline.vip complipilot.dev fixmyweb.dev paymentrescue.dev parseflow.dev captureapi.dev"
        run: |
          for domain in $DOMAINS; do
            # Verify sitemap is accessible and valid
            STATUS=$(curl -sI "https://${domain}/sitemap.xml" -o /dev/null -w "%{http_code}")
            SIZE=$(curl -sI "https://${domain}/sitemap.xml" -o /dev/null -w "%{size_download}")
            echo "sitemap ${domain}: HTTP $STATUS (${SIZE} bytes)"
          done

      - name: Send report email
        if: always()
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "$BREVO_API_KEY" ]; then
            echo "BREVO_API_KEY not set — skipping notification"
            exit 0
          fi
          curl -s -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "accept: application/json" \
            -H "api-key: $BREVO_API_KEY" \
            -H "content-type: application/json" \
            -d '{
              "sender": {"name": "DevToolsmith Indexing", "email": "hello@captureapi.dev"},
              "to": [{"email": "antonio.alt3000@gmail.com", "name": "Antonio"}],
              "subject": "Auto-Indexing Report",
              "htmlContent": "<p>Auto-indexing completed for 6 domains. Check <a href=\"https://github.com/antonioalt3000-cyber/toolkit-online/actions\">GitHub Actions</a> for details.</p>"
            }' || echo "Email send failed — not blocking"
