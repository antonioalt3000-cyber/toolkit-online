name: Watchtower E2E

# Real customer-journey monitoring for the 5 SaaS portfolio.
# Replaces the legacy auto-functional-test.yml that only did HTTP-status checks.
#
# Schedule: every hour at :00. Runs on GitHub-hosted Linux runner with
# headless Playwright Chromium — no local PC needed, my desktop can be
# fully off and this still runs.
#
# Email behaviour (handled by run.ts internally):
#   - any SaaS yellow/red → critical alert email per failing SaaS, every hour
#                           the failure persists, on antonio.alt3000@gmail.com
#   - all green AND digest hour (07/12/18 UTC = 09/14/20 CEST)
#                           → routine digest email "All systems OK"
#   - all green AND non-digest hour → silent

on:
  schedule:
    # Every hour at minute 5 (offset from other hourly workflows for runner availability)
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Run only one SaaS (e.g. F1, F2, F3, F4, B7). Empty = all."
        required: false
        default: ""
      skip_email:
        description: "Skip Brevo email send (debug)."
        required: false
        default: "false"
  push:
    # Validate every change to the monitoring code itself by running it
    # immediately on push (fast feedback when we tweak a test plan).
    # NOTE: branches filter intentionally permissive while the system is
    # being validated. Tighten back to [master] once it is proven stable.
    paths:
      - ".github/workflows/watchtower-e2e.yml"
      - "e2e/watchtower/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read
  actions: read

concurrency:
  group: watchtower-e2e
  cancel-in-progress: false

jobs:
  run:
    name: Run E2E across 5 SaaS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Watchtower
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          WATCHTOWER_ALERT_EMAIL: ${{ vars.WATCHTOWER_ALERT_EMAIL || 'antonio.alt3000@gmail.com' }}
          WATCHTOWER_DIGEST_HOURS_UTC: ${{ vars.WATCHTOWER_DIGEST_HOURS_UTC || '7,12,18' }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ inputs.only }}"
          fi
          if [ "${{ inputs.skip_email }}" = "true" ]; then
            ARGS="$ARGS --skip-email"
          fi
          npx tsx e2e/watchtower/run.ts $ARGS

      - name: Upload artifacts (screenshots + result JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-${{ github.run_id }}
          path: watchtower-artifacts/
          retention-days: 14
          if-no-files-found: ignore
