name: Lighthouse CI

# Zero-cost Core Web Vitals report. Builds the site, runs Lighthouse against a
# few representative routes, and uploads the report to temporary public storage
# (free, no account/token). Non-blocking: surfaces CWV regressions as a report
# link on each PR rather than failing the build.

on:
  workflow_dispatch:
  pull_request:
    branches-ignore:
      - master

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Tolerant install: a Windows-generated lockfile prunes linux-only
        # optional deps (@emnapi/*), so strict `npm ci` intermittently fails the
        # sync check on the linux runner. Fall back to `npm install`. See memory
        # "Lockfile drift"; mirrors ci.yml and 44c3388.
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/en
            http://localhost:3000/en/faq
            http://localhost:3000/en/about
          startServerCommand: npm run start
          uploadArtifacts: true
          temporaryPublicStorage: true
