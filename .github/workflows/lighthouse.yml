name: Lighthouse CI

# Zero-cost Core Web Vitals report. Builds the site, runs Lighthouse against a
# few representative routes, and uploads the report to temporary public storage
# (free, no account/token). Non-blocking: surfaces CWV regressions as a report
# link on each PR rather than failing the build.

on:
  workflow_dispatch:
  pull_request:
    branches-ignore:
      - master

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm install (not ci): the Windows-generated lockfile prunes linux-only
        # optional deps (@emnapi/*), so `npm ci` strict-sync fails on the linux
        # runner. install reconciles it deterministically enough for this probe.
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/en
            http://localhost:3000/en/faq
            http://localhost:3000/en/about
          startServerCommand: npm run start
          uploadArtifacts: true
          temporaryPublicStorage: true
