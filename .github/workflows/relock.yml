name: Relock (regenerate package-lock on Linux)

# One-off maintenance utility. The committed package-lock.json was generated on a
# different platform and lacks the Linux-resolved optional WASM deps
# (@emnapi/@oxc-parser), so `npm ci` fails in CI. This regenerates the lockfile on
# the SAME OS the CI runs on (ubuntu) and commits it. Manual trigger only — it
# never runs automatically, so there is no standing auto-committer.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: relock
  cancel-in-progress: false

jobs:
  relock:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --ignore-scripts skips the husky `prepare` step (not needed here and it
      # fails in a bare checkout). --package-lock-only writes the lock without a
      # full install.
      - name: Regenerate lockfile on Linux
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit & push if the lockfile changed
        run: |
          if git diff --quiet package-lock.json; then
            echo "package-lock.json already in sync — nothing to do."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: sync package-lock.json on linux"
            git push
            echo "lockfile synced and pushed."
          fi
